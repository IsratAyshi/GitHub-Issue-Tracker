<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker | Login</title>

    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- daisy ui cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awsome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google text font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body>
    <main
      class="card w-[60%] max-w-md shrink-0 shadow-2xl mx-auto m-34"
    >
        <div class=" bg-base-100 rounded-lg">
          <div class="hero-content flex-col lg:flex-row-reverse">

            <div class="flex justify-center items-center flex-col text-center">
              <img src="./assets/github-logo.png" alt="" />
              <h2 class="text-2xl font-semibold mt-6">GitHub Issues Tracker</h2>
              <p class="text-[#64748bFF]">Sign in to manage your issues</p>
            </div>
            
            
          </div>
        </div>
    </main>


    <script src="./scripts/login.js"></script>

</html>
