    <meta charset="UTF-8" />

    <title>GitHub Issue Tracker | Home</title>

    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- daisy ui cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awsome cdn -->
    <link
      rel="stylesheet"

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google text font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }

      .badge-closed{
        background-color: #a855f7FF;
        color: rgb(31, 15, 46);
        font-weight: 400;
      }

      .badge-low{
        background-color: #eeeff2FF;
        color: #9ca3afFF;
        font-weight: 400;
      }
    </style>
    
  </head>


  <body class="bg-base-300">
    <header>
        <nav>
            <div class="navbar bg-base-100 shadow-sm pt-4 pb-4">
                <div class="flex items-center gap-2 flex-1">
                    <img class="w-9" src="./assets/github-logo.png" alt="">
                    <h1 class="text-2xl text-[#1f2937] font-semibold">GitHub Issues Tracker</h1>
                </div>
                <div class="flex gap-2">
                    <label class="input">
                        <i class="fa-solid fa-magnifying-glass opacity-60"></i>
                        <input id="input-search" type="text" placeholder="Search issues..."/>
                    </label>
                    <button class="btn btn-primary ">+ New Issue</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="maincontainer w-[80%] mx-auto">

        <!-- top buttons -->
        <section class="card bg-base-100 mt-[60px] shadow-sm">
            <div class="card-body flex-row gap-2">
                <button onclick="activeFilterBtn('all-btn')" id="all-btn" class="btn btn-primary text-white px-9" id="all-filter-btn">All</button>

                <button onclick="activeFilterBtn('open-btn')"  id="open-btn" class="btn px-9" id="interview-filter-btn">Open</button>

                <button onclick="activeFilterBtn('closed-btn')"  id="closed-btn" class="btn px-9" id="rejected-filter-btn">Closed</button>
            </div>
        </section>

        <!-- Issue count -->
        <section class="card bg-base-100 mt-4 shadow-sm">
            <div class="card-body flex-row gap-2 justify-between items-center">

                <div class="flex flex-rowitems-center gap-2">

                    <div class="flex item-center justify-center bg-[#ece4ffFF] rounded-full p-3">
                        <img class="w-10" src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="text-xl font-semibold">
                            <span id="issue-count">50</span> Issues</h2>
                        <p class="text-[#64748bFF]">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-3">
                    <div class="flex gap-2 items-center">
                        <div class="flex item-center justify-center bg-[#00a96eFF] rounded-full w-3 h-3"></div>
                        <p class="font-medium">Open</p>
                    </div>
                    <div class="flex gap-2 items-center">
                        <div class="flex item-center justify-center bg-[#a855f7FF] rounded-full w-3 h-3"></div>
                        <p class="font-medium">Closed</p>
                    </div>
                </div>

            </div>

        </section>

        <!-- Issues section-->
        <section class="card bg-base-200 shadow-sm">
            <div class="p-6">
                
                <div id="issueContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- dynamically issue cards will be loaded here -->

                </div>

            </div>
        </section>

        <!-- Issue details modal -->
        <div id="modalContainer">
            <!-- modal loads dynamically here -->

  </body>

</html>
